<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Cộng đồng VIDEO AI AFFILIATE - Phỏng vấn cá nhân hoá lộ trình</title>
  <meta name="description" content="Phỏng vấn 3 phút để nhận lộ trình học AI cá nhân hoá từ Cộng đồng VIDEO AI AFFILIATE." />
  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <img src="logo.jpg" class="logo-badge-img" alt="AVA" />
        <span class="logo-text">VIDEO AI AFFILIATE</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">0 / 0</div>
      </div>
    </header>

    <main class="chat" id="chat">
      <!-- messages injected here -->
    </main>

    <footer class="composer" id="composer">
      <!-- input area injected here -->
    </footer>
  </div>

  <template id="tpl-bot">
    <div class="msg msg-bot">
      <div class="avatar">🤖</div>
      <div class="bubble"><div class="bubble-text"></div></div>
    </div>
  </template>

  <template id="tpl-user">
    <div class="msg msg-user">
      <div class="bubble"><div class="bubble-text"></div></div>
    </div>
  </template>

  <template id="tpl-typing">
    <div class="msg msg-bot typing">
      <div class="avatar">🤖</div>
      <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
